<!DOCTYPE html>
<html>
<head>
    <title>Hello World</title>
</head>
<body>
    <h1 id="greeting"></h1>
    
    <script>
        // Display in the browser console
        console.log("Hello World");
        
        // Display on the web page
        document.getElementById("greeting").innerHTML = "Hello World";
        
        // You can also use alert
        // alert("Hello World");
    </script>
</body>
</html>
